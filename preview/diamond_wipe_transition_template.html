
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }

  .wrap { padding: 1rem 0; }

  .preview-section {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-lg);
    border: 0.5px solid var(--color-border-tertiary);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .preview-label {
    font-size: 12px;
    color: var(--color-text-secondary);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .canvas-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
  }

  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1rem;
  }

  .control-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 12px 14px;
  }

  .ctrl-label {
    font-size: 12px;
    color: var(--color-text-secondary);
    margin-bottom: 8px;
  }

  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ctrl-row input[type=range] { flex: 1; }
  .ctrl-val {
    font-size: 13px;
    font-weight: 500;
    min-width: 36px;
    text-align: right;
    color: var(--color-text-primary);
  }

  .color-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .color-swatch {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .color-swatch.active { border-color: var(--color-text-primary); }

  input[type=color] {
    width: 28px; height: 24px;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 4px;
    padding: 1px;
    cursor: pointer;
  }

  .text-input {
    width: 100%;
    font-size: 13px;
    padding: 5px 8px;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    outline: none;
  }
  .text-input:focus { border-color: var(--color-border-secondary); }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 0.5rem;
  }

  button {
    flex: 1;
    font-size: 13px;
    padding: 8px 12px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: transparent;
    color: var(--color-text-primary);
    cursor: pointer;
    transition: background 0.1s;
  }
  button:hover { background: var(--color-background-secondary); }
  button:active { transform: scale(0.98); }

  button.primary {
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border-color: transparent;
  }
  button.primary:hover { opacity: 0.85; }

  .section-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-secondary);
    margin: 0.75rem 0 0.5rem;
  }

  select {
    font-size: 13px;
    padding: 5px 8px;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    width: 100%;
  }
</style>

<div class="wrap">

  <div class="preview-section">
    <div class="preview-label">Preview</div>
    <div class="canvas-wrap">
      <canvas id="c"></canvas>
    </div>
  </div>

  <div class="btn-row">
    <button onclick="playTransition()">▶ Play transition</button>
    <button onclick="resetPreview()">↺ Reset</button>
  </div>

  <p class="section-title">Speed & timing</p>
  <div class="controls">
    <div class="control-card">
      <div class="ctrl-label">Total duration</div>
      <div class="ctrl-row">
        <input type="range" id="dur" min="0.5" max="4" step="0.1" value="1.5" oninput="upd()">
        <span class="ctrl-val" id="durV">1.5s</span>
      </div>
    </div>
    <div class="control-card">
      <div class="ctrl-label">Diamond count</div>
      <div class="ctrl-row">
        <input type="range" id="cols" min="1" max="8" step="1" value="3" oninput="upd()">
        <span class="ctrl-val" id="colsV">3</span>
      </div>
    </div>
    <div class="control-card">
      <div class="ctrl-label">Hold on logo</div>
      <div class="ctrl-row">
        <input type="range" id="hold" min="0" max="2" step="0.1" value="0.5" oninput="upd()">
        <span class="ctrl-val" id="holdV">0.5s</span>
      </div>
    </div>
    <div class="control-card">
      <div class="ctrl-label">Softness</div>
      <div class="ctrl-row">
        <input type="range" id="soft" min="0" max="30" step="1" value="0" oninput="upd()">
        <span class="ctrl-val" id="softV">0</span>
      </div>
    </div>
  </div>

  <p class="section-title">Overlay color</p>
  <div class="control-card" style="margin-bottom:10px;">
    <div class="ctrl-label">Diamond fill</div>
    <div class="color-row" id="swatchRow">
    </div>
  </div>

  <p class="section-title">Center text / logo</p>
  <div class="control-card" style="margin-bottom:10px; display:flex; flex-direction:column; gap:8px;">
    <div class="ctrl-label">Display text</div>
    <input class="text-input" id="logoText" value="ANGELS" oninput="upd()">
    <div class="ctrl-label" style="margin-top:4px;">Font size</div>
    <div class="ctrl-row">
      <input type="range" id="fontSize" min="12" max="80" step="1" value="42" oninput="upd()">
      <span class="ctrl-val" id="fontSizeV">42</span>
    </div>
    <div class="ctrl-label">Text color</div>
    <input type="color" id="textColor" value="#ffffff" oninput="upd()">
  </div>

  <p class="section-title">Direction</p>
  <div class="control-card" style="margin-bottom:10px;">
    <select id="dir" onchange="upd()">
      <option value="in">Diamonds expand inward (open)</option>
      <option value="out">Diamonds contract outward (close)</option>
      <option value="inout" selected>Both — open then close</option>
    </select>
  </div>

</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const SWATCHES = [
  {hex:'#1a1a2e', label:'Navy'},
  {hex:'#cc0000', label:'Red'},
  {hex:'#C8102E', label:'Angels'},
  {hex:'#003087', label:'Dodger'},
  {hex:'#1d3461', label:'Dark blue'},
  {hex:'#2d2d2d', label:'Charcoal'},
  {hex:'#ffffff', label:'White'},
  {hex:'#f0a500', label:'Gold'},
];
let overlayColor = '#C8102E';

const swatchRow = document.getElementById('swatchRow');
SWATCHES.forEach(s => {
  const el = document.createElement('div');
  el.className = 'color-swatch' + (s.hex === overlayColor ? ' active' : '');
  el.style.background = s.hex;
  el.title = s.label;
  el.onclick = () => {
    overlayColor = s.hex;
    document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    upd();
  };
  swatchRow.appendChild(el);
});

const customSwatch = document.createElement('input');
customSwatch.type = 'color';
customSwatch.value = overlayColor;
customSwatch.title = 'Custom';
customSwatch.style.cssText = 'width:24px;height:24px;border-radius:50%;border:0.5px solid var(--color-border-tertiary);padding:1px;cursor:pointer;';
customSwatch.oninput = () => { overlayColor = customSwatch.value; upd(); };
swatchRow.appendChild(customSwatch);

let animId = null;
let startTime = null;
let phase = 'idle';
let cfg = {};

function getConfig() {
  return {
    dur: parseFloat(document.getElementById('dur').value),
    cols: parseInt(document.getElementById('cols').value),
    hold: parseFloat(document.getElementById('hold').value),
    soft: parseInt(document.getElementById('soft').value),
    logoText: document.getElementById('logoText').value,
    fontSize: parseInt(document.getElementById('fontSize').value),
    textColor: document.getElementById('textColor').value,
    dir: document.getElementById('dir').value,
    color: overlayColor,
  };
}

function upd() {
  document.getElementById('durV').textContent = parseFloat(document.getElementById('dur').value).toFixed(1) + 's';
  document.getElementById('colsV').textContent = document.getElementById('cols').value;
  document.getElementById('holdV').textContent = parseFloat(document.getElementById('hold').value).toFixed(1) + 's';
  document.getElementById('softV').textContent = document.getElementById('soft').value;
  document.getElementById('fontSizeV').textContent = document.getElementById('fontSize').value;
  drawStatic(0);
}

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.width * 9/16;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function drawScene(c, t, cfg) {
  const W = c.width, H = c.height;
  c.clearRect(0,0,W,H);

  const videoA = '#1a1a2e';
  const videoB = '#0a2a0a';

  const dir = cfg.dir;
  const dur = cfg.dur;
  const hold = cfg.hold;
  const totalDur = dur + hold + (dir === 'inout' ? dur : 0);

  let openProgress = 0, closeProgress = 0;
  if (dir === 'in' || dir === 'inout') {
    openProgress = Math.min(1, t / dur);
  }
  if (dir === 'out') {
    closeProgress = Math.min(1, t / dur);
  }
  if (dir === 'inout') {
    const holdEnd = dur + hold;
    if (t > dur) closeProgress = Math.min(1, (t - holdEnd) / dur);
  }

  const easeInOut = x => x < 0.5 ? 2*x*x : 1 - Math.pow(-2*x+2,2)/2;
  const ep = easeInOut(openProgress);
  const cp = easeInOut(closeProgress);

  const cols = cfg.cols;
  const rows = Math.round(cols * H / W);
  const dW = W / cols;
  const dH = H / rows;

  const [cr, cg, cb] = hexToRgb(cfg.color);

  c.fillStyle = closeProgress < 1 ? videoA : videoB;
  c.fillRect(0,0,W,H);

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const cx = dW * (col + 0.5);
      const cy = dH * (row + 0.5);
      const maxR = Math.sqrt((dW/2)**2 + (dH/2)**2) + cfg.soft;
      const rOpen = ep * maxR;
      const rClose = cp * maxR;

      if (ep > 0) {
        c.save();
        c.beginPath();
        c.moveTo(cx, cy - rOpen);
        c.lineTo(cx + rOpen, cy);
        c.lineTo(cx, cy + rOpen);
        c.lineTo(cx - rOpen, cy);
        c.closePath();
        c.fillStyle = `rgba(${cr},${cg},${cb},1)`;
        c.fill();
        c.restore();
      }

      if (cp > 0) {
        c.save();
        const fullR = maxR;
        c.beginPath();
        c.moveTo(cx, cy - fullR);
        c.lineTo(cx + fullR, cy);
        c.lineTo(cx, cy + fullR);
        c.lineTo(cx - fullR, cy);
        c.closePath();

        c.beginPath();
        c.moveTo(cx, cy - (fullR - rClose));
        c.lineTo(cx + (fullR - rClose), cy);
        c.lineTo(cx, cy + (fullR - rClose));
        c.lineTo(cx - (fullR - rClose), cy);
        c.closePath();

        c.save();
        c.beginPath();
        c.moveTo(cx, cy - fullR);
        c.lineTo(cx + fullR, cy);
        c.lineTo(cx, cy + fullR);
        c.lineTo(cx - fullR, cy);
        c.closePath();
        c.clip();
        c.fillStyle = videoB;
        c.fillRect(cx - fullR, cy - fullR, fullR*2, fullR*2);
        c.restore();

        c.save();
        c.beginPath();
        c.moveTo(cx, cy - (fullR - rClose));
        c.lineTo(cx + (fullR - rClose), cy);
        c.lineTo(cx, cy + (fullR - rClose));
        c.lineTo(cx - (fullR - rClose), cy);
        c.closePath();
        c.clip();
        c.fillStyle = `rgba(${cr},${cg},${cb},1)`;
        c.fillRect(cx - fullR, cy - fullR, fullR*2, fullR*2);
        c.restore();

        c.restore();
      }
    }
  }

  if (ep > 0.3 && (dir === 'in' || (dir === 'inout' && cp < 0.5))) {
    const fade = Math.min(1, (ep - 0.3) / 0.4) * (1 - Math.min(1, cp / 0.3));
    c.save();
    c.globalAlpha = fade;
    c.fillStyle = cfg.textColor;
    c.font = `500 ${cfg.fontSize}px var(--font-sans, sans-serif)`;
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText(cfg.logoText, W/2, H/2);
    c.restore();
  }
}

function drawStatic(t) {
  resize();
  cfg = getConfig();
  drawScene(ctx, t, cfg);
}

function playTransition() {
  if (animId) cancelAnimationFrame(animId);
  resize();
  cfg = getConfig();
  const dir = cfg.dir;
  const totalDur = cfg.dur + cfg.hold + (dir === 'inout' ? cfg.dur : 0);

  startTime = null;
  function frame(ts) {
    if (!startTime) startTime = ts;
    const t = (ts - startTime) / 1000;
    drawScene(ctx, t, cfg);
    if (t < totalDur + 0.1) {
      animId = requestAnimationFrame(frame);
    } else {
      drawScene(ctx, totalDur + 1, cfg);
    }
  }
  animId = requestAnimationFrame(frame);
}

function resetPreview() {
  if (animId) cancelAnimationFrame(animId);
  drawStatic(0);
}

window.addEventListener('resize', () => drawStatic(0));
drawStatic(0);
</script>
